<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <main>
        <div class="container">
            <div id="rock">
                <img src="images/Rock.png" alt="Rock">
                <h4>Rock</h4>
            </div>
            <div id="paper">
                <img src="images/paper.png" alt="Rock">
                <h4>Paper</h4>
            </div>
            <div id="scissors">
                <img src="images/scissors.png" alt="Rock">
                <h4>Scissors</h4>
            </div>
            
        </div>

        <div class="choice">
            <div class="box">
                <h4>User: <span id="userChoice"></span></h4>
            </div>

             <div class="box">
                <h4>Comp: <span id="compChoice"></span></h4>
            </div>
        </div>

        <div class="score">
            <div >
                <h1 id="user">0</h1>
                <h4>You</h4>
            </div>

             <div>
                <h1  id="comp">0</h1>
                <h4>Comp</h4>
            </div>

        </div>

     
            <div class="message">
                <div class="inside">
                    <h3 id="msg">Play Your Move</h3>
                </div>
                
            </div>
        
    </main>

    <script src="app.js"> </script>
</body>
</html>
